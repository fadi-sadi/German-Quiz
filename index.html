<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A trivia quiz game powered by YAML question files" />
    <title>Trivia Game</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main id="app">
      <div id="loading-screen" class="screen" tabindex="-1">
        <p>Loading game…</p>
      </div>

      <div id="start-screen" class="screen hidden" tabindex="-1">
        <h1 id="game-title"></h1>
        <p id="question-count"></p>
        <button id="start-btn" class="btn btn-primary">Start Quiz</button>
      </div>

      <div id="quiz-screen" class="screen hidden" tabindex="-1">
        <header class="quiz-header">
          <span id="progress-text"></span>
          <span id="score-text" aria-live="polite"></span>
        </header>
        <div class="question-card">
          <h2 id="question-text"></h2>
          <button id="hint-btn" class="btn btn-hint hidden" aria-expanded="false">Show Hint</button>
          <p id="hint-text" class="hint-text hidden"></p>
          <div id="options-grid" role="group" aria-label="Answer options"></div>
          <button id="next-btn" class="btn btn-primary hidden">Next Question</button>
        </div>
      </div>

      <div id="result-screen" class="screen hidden" tabindex="-1">
        <h2>Quiz Complete!</h2>
        <div class="result-summary">
          <p class="result-score" id="final-score"></p>
          <p id="final-message"></p>
        </div>
        <button id="restart-btn" class="btn btn-primary">Play Again</button>
      </div>

      <div id="error-screen" class="screen hidden" role="alert" tabindex="-1">
        <h2>Error</h2>
        <p id="error-message"></p>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
